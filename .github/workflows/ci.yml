name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci (dagger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: shard-proxy

      - name: Resolve shard-common ref
        id: common_ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ -n "$BRANCH" ] && gh api "repos/lightwebinc/shard-common/branches/$BRANCH" >/dev/null 2>&1; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "Using shard-common@$BRANCH (matching feature branch found)"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
            echo "Using shard-common@main (no matching feature branch)"
          fi

      - uses: actions/checkout@v6
        with:
          repository: lightwebinc/shard-common
          ref: ${{ steps.common_ref.outputs.ref }}
          path: shard-common

      - uses: actions/setup-go@v6
        with:
          go-version-file: shard-proxy/ci/go.mod
          cache: false

      - name: Run Dagger pipeline
        working-directory: shard-proxy
        env:
          GOWORK: "off"
        run: make ci

  e2e:
    name: e2e (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: shard-proxy

      - name: Resolve shard-common ref
        id: common_ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ -n "$BRANCH" ] && gh api "repos/lightwebinc/shard-common/branches/$BRANCH" >/dev/null 2>&1; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          repository: lightwebinc/shard-common
          ref: ${{ steps.common_ref.outputs.ref }}
          path: shard-common

      - uses: actions/setup-go@v6
        with:
          go-version-file: shard-proxy/go.mod

      - name: Use local shard-common
        working-directory: shard-proxy
        run: go mod edit -replace github.com/lightwebinc/shard-common=../shard-common

      - name: Install curl
        run: sudo apt-get install -y --no-install-recommends curl

      - name: Enable IPv6 multicast on loopback
        run: |
          sudo ip link set lo multicast on
          sudo ip -6 route add ff00::/8 dev lo table local 2>/dev/null || true

      - name: E2E test
        working-directory: shard-proxy
        run: make test-e2e
